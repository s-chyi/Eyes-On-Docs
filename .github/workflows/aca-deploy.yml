# .github/workflows/aca-deploy.yml
# Deploys eyes-on-docs 三個元件（web / mcp / monitor）到 Azure Container Apps。
# Auth: OIDC federated credential 走 UAMI；每個 target env 有各自 UAMI + federated cred。
#
# 支援兩個 target env：
#   - prod (default)  → Nick sub, 走 repo-level vars/secrets (no environment binding)
#   - non-prod        → corp non-prod sub, 走 GH Environment 'non-prod' 的 vars/secrets
#
# 需要在 GitHub repo 設定：
#   Repo-level (prod) Variables:
#     AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID,
#     ACR_NAME, RESOURCE_GROUP, ACA_ENVIRONMENT,
#     WEB_APP_NAME, MCP_APP_NAME, MONITOR_JOB_NAME, WEB_FQDN
#   Repo-level (prod) Secrets:
#     NEXT_PUBLIC_GA_ID, TARGET_CONFIG_JSON, TARGET_CONFIG_NICK_SMOKE_JSON
#
#   Environment 'non-prod' (env-scoped) Variables + Secrets — 同上一組 key、但值指 corp non-prod。
#   Plus non-prod env-scoped secrets for runtime env (Cosmos/AOAI/SP/PAT) — 這組 prod 那邊沒用到
#   (prod monitor Job 的 env 是 az cli 直接 set，非透過 CI；non-prod 我們讓 CI 補上)。

name: aca-deploy

# 只允許手動觸發、選 target env
on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        type: choice
        required: true
        default: 'prod'
        options:
          - prod
          - non-prod

permissions:
  id-token: write   # OIDC
  contents: read

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 綁 GH Environment 讓 env-scoped vars/secrets 疊上 repo-level（env 值優先）
    # target_env='prod' 綁 'prod' env — 若不存在則 fallback 拿 repo-level（無 GH 檢查會通過）
    environment: ${{ inputs.target_env }}
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: monitor
            dockerfile: Dockerfile.monitor
          - name: mcp
            dockerfile: Dockerfile.mcp
          - name: web
            dockerfile: Dockerfile.web
    steps:
      - uses: actions/checkout@v4

      - name: Write gitignored target_config files from secrets
        # target_config.json + target_config-nick-smoke.json are gitignored
        # (Nick-only, contain Teams webhooks etc). Dockerfile COPY expects them
        # at the repo root, so materialize them into the runner's checkout.
        run: |
          printf '%s' '${{ secrets.TARGET_CONFIG_JSON }}' > target_config.json
          printf '%s' '${{ secrets.TARGET_CONFIG_NICK_SMOKE_JSON }}' > target_config-nick-smoke.json
          # Validate JSON so a broken secret fails fast, not deep in docker build
          python3 -c "import json; json.load(open('target_config.json')); json.load(open('target_config-nick-smoke.json')); print('config json valid')"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build & push ${{ matrix.component.name }}
        run: |
          IMAGE="${{ vars.ACR_NAME }}.azurecr.io/eyesondocs-${{ matrix.component.name }}:${IMAGE_TAG}"
          BUILD_ARGS=""
          if [ "${{ matrix.component.name }}" = "web" ]; then
            BUILD_ARGS="--build-arg NEXT_PUBLIC_GA_ID=${{ secrets.NEXT_PUBLIC_GA_ID }}"
          fi
          docker build -f ${{ matrix.component.dockerfile }} $BUILD_ARGS -t "$IMAGE" .
          docker push "$IMAGE"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # 冪等部署：資源存在 → 只 update image；資源不存在 → 完整 create 帶 env/secrets/scale/ingress
      # 完整 create 只在 bootstrap（e.g. non-prod env 重建後首次部署）走一次
      #
      # UAMI resource id：用 AZURE_CLIENT_ID(UAMI clientId) 反查
      - name: Resolve UAMI resource id
        id: uami
        run: |
          UAMI_ID=$(az identity list -g ${{ vars.RESOURCE_GROUP }} \
            --query "[?clientId=='${{ vars.AZURE_CLIENT_ID }}'].id | [0]" -o tsv)
          if [ -z "$UAMI_ID" ]; then
            echo "!! could not resolve UAMI id for client ${{ vars.AZURE_CLIENT_ID }}"; exit 1
          fi
          echo "uami_id=$UAMI_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy web app (create-or-update)
        run: |
          IMAGE="${{ vars.ACR_NAME }}.azurecr.io/eyesondocs-web:${IMAGE_TAG}"
          if az containerapp show -n ${{ vars.WEB_APP_NAME }} -g ${{ vars.RESOURCE_GROUP }} >/dev/null 2>&1; then
            echo "web exists — updating image only"
            az containerapp update \
              --name ${{ vars.WEB_APP_NAME }} \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --image "$IMAGE"
          else
            echo "web missing — full create"
            # secrets first, then env vars referencing them
            az containerapp create \
              --name ${{ vars.WEB_APP_NAME }} \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --environment ${{ vars.ACA_ENVIRONMENT }} \
              --image "$IMAGE" \
              --user-assigned "${{ steps.uami.outputs.uami_id }}" \
              --registry-server ${{ vars.ACR_NAME }}.azurecr.io \
              --registry-identity "${{ steps.uami.outputs.uami_id }}" \
              --ingress external --target-port 10086 --transport auto \
              --min-replicas ${{ vars.WEB_MIN_REPLICAS || '0' }} --max-replicas 2 \
              --cpu 0.5 --memory 1Gi \
              --secrets \
                app-tenant-id="${{ secrets.APP_TENANT_ID }}" \
                app-client-id="${{ secrets.APP_CLIENT_ID }}" \
                app-client-secret="${{ secrets.APP_CLIENT_SECRET }}" \
                cosmos-account="${{ secrets.AZURE_COSMOSDB_ACCOUNT }}" \
                cosmos-db="${{ secrets.AZURE_COSMOSDB_DATABASE }}" \
                cosmos-container="${{ secrets.AZURE_COSMOSDB_CONVERSATIONS_CONTAINER }}" \
                cosmos-usertraffic="${{ secrets.AZURE_COSMOSDB_USER_TRAFFIC_CONTAINER }}" \
                nextauth-secret="${{ secrets.NEXTAUTH_SECRET }}" \
                admin-password="${{ secrets.ADMIN_PASSWORD }}" \
              --env-vars \
                APP_TENANT_ID=secretref:app-tenant-id \
                APP_CLIENT_ID=secretref:app-client-id \
                APP_CLIENT_SECRET=secretref:app-client-secret \
                AZURE_COSMOSDB_ACCOUNT=secretref:cosmos-account \
                AZURE_COSMOSDB_DATABASE=secretref:cosmos-db \
                AZURE_COSMOSDB_CONVERSATIONS_CONTAINER=secretref:cosmos-container \
                AZURE_COSMOSDB_USER_TRAFFIC_CONTAINER=secretref:cosmos-usertraffic \
                NEXTAUTH_SECRET=secretref:nextauth-secret \
                NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
                ADMIN_PASSWORD=secretref:admin-password \
                LOG_TO_STDOUT_ONLY=1
          fi

      - name: Deploy mcp app (create-or-update)
        run: |
          IMAGE="${{ vars.ACR_NAME }}.azurecr.io/eyesondocs-mcp:${IMAGE_TAG}"
          if az containerapp show -n ${{ vars.MCP_APP_NAME }} -g ${{ vars.RESOURCE_GROUP }} >/dev/null 2>&1; then
            echo "mcp exists — updating image only"
            az containerapp update \
              --name ${{ vars.MCP_APP_NAME }} \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --image "$IMAGE"
          else
            echo "mcp missing — full create"
            az containerapp create \
              --name ${{ vars.MCP_APP_NAME }} \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --environment ${{ vars.ACA_ENVIRONMENT }} \
              --image "$IMAGE" \
              --user-assigned "${{ steps.uami.outputs.uami_id }}" \
              --registry-server ${{ vars.ACR_NAME }}.azurecr.io \
              --registry-identity "${{ steps.uami.outputs.uami_id }}" \
              --ingress external --target-port 8000 --transport auto \
              --min-replicas ${{ vars.MCP_MIN_REPLICAS || '0' }} --max-replicas 2 \
              --cpu 0.5 --memory 1Gi \
              --secrets \
                app-tenant-id="${{ secrets.APP_TENANT_ID }}" \
                app-client-id="${{ secrets.APP_CLIENT_ID }}" \
                app-client-secret="${{ secrets.APP_CLIENT_SECRET }}" \
                cosmos-account="${{ secrets.AZURE_COSMOSDB_ACCOUNT }}" \
                cosmos-db="${{ secrets.AZURE_COSMOSDB_DATABASE }}" \
                cosmos-container="${{ secrets.AZURE_COSMOSDB_CONVERSATIONS_CONTAINER }}" \
                cosmos-usertraffic="${{ secrets.AZURE_COSMOSDB_USER_TRAFFIC_CONTAINER }}" \
                admin-password="${{ secrets.ADMIN_PASSWORD }}" \
              --env-vars \
                APP_TENANT_ID=secretref:app-tenant-id \
                APP_CLIENT_ID=secretref:app-client-id \
                APP_CLIENT_SECRET=secretref:app-client-secret \
                AZURE_COSMOSDB_ACCOUNT=secretref:cosmos-account \
                AZURE_COSMOSDB_DATABASE=secretref:cosmos-db \
                AZURE_COSMOSDB_CONVERSATIONS_CONTAINER=secretref:cosmos-container \
                AZURE_COSMOSDB_USER_TRAFFIC_CONTAINER=secretref:cosmos-usertraffic \
                DOCS_USAGE_ADMIN_PASSWORD=secretref:admin-password
          fi

      - name: Deploy monitor job (create-or-update)
        run: |
          IMAGE="${{ vars.ACR_NAME }}.azurecr.io/eyesondocs-monitor:${IMAGE_TAG}"
          if az containerapp job show -n ${{ vars.MONITOR_JOB_NAME }} -g ${{ vars.RESOURCE_GROUP }} >/dev/null 2>&1; then
            echo "monitor job exists — updating image only"
            az containerapp job update \
              --name ${{ vars.MONITOR_JOB_NAME }} \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --image "$IMAGE"
          else
            echo "monitor job missing — full create"
            az containerapp job create \
              --name ${{ vars.MONITOR_JOB_NAME }} \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --environment ${{ vars.ACA_ENVIRONMENT }} \
              --image "$IMAGE" \
              --trigger-type Schedule --cron-expression "0 */2 * * *" \
              --replica-timeout 3600 --replica-retry-limit 1 --parallelism 1 --replica-completion-count 1 \
              --mi-user-assigned "${{ steps.uami.outputs.uami_id }}" \
              --registry-server ${{ vars.ACR_NAME }}.azurecr.io \
              --registry-identity "${{ steps.uami.outputs.uami_id }}" \
              --cpu 0.5 --memory 1Gi \
              --secrets \
                app-tenant-id="${{ secrets.APP_TENANT_ID }}" \
                app-client-id="${{ secrets.APP_CLIENT_ID }}" \
                app-client-secret="${{ secrets.APP_CLIENT_SECRET }}" \
                cosmos-account="${{ secrets.AZURE_COSMOSDB_ACCOUNT }}" \
                cosmos-db="${{ secrets.AZURE_COSMOSDB_DATABASE }}" \
                cosmos-container="${{ secrets.AZURE_COSMOSDB_CONVERSATIONS_CONTAINER }}" \
                aoai-key="${{ secrets.AZURE_OPENAI_KEY }}" \
                personal-token="${{ secrets.PERSONAL_TOKEN }}" \
              --env-vars \
                APP_TENANT_ID=secretref:app-tenant-id \
                APP_CLIENT_ID=secretref:app-client-id \
                APP_CLIENT_SECRET=secretref:app-client-secret \
                AZURE_COSMOSDB_ACCOUNT=secretref:cosmos-account \
                AZURE_COSMOSDB_DATABASE=secretref:cosmos-db \
                AZURE_COSMOSDB_CONVERSATIONS_CONTAINER=secretref:cosmos-container \
                AZURE_OPENAI_KEY=secretref:aoai-key \
                AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
                AZURE_OPENAI_DEPLOYMENT="${{ secrets.AZURE_OPENAI_DEPLOYMENT }}" \
                PERSONAL_TOKEN=secretref:personal-token \
                DISABLE_TEAMS_WEBHOOK=1 \
                RUN_ONCE=1 \
                TARGET_CONFIG_PATH=/app/target_config.json
          fi

      - name: Smoke test (web)
        run: |
          # /api/products 有 fallback branch，即使 config 缺也 return 200 → 適合 readiness
          # 若 WEB_FQDN 尚未填(首次部 non-prod)、skip smoke。
          if [ "${{ vars.WEB_FQDN }}" = "TBD-after-first-deploy" ] || [ -z "${{ vars.WEB_FQDN }}" ]; then
            echo "WEB_FQDN not set yet (first deploy?); skipping smoke test"
            exit 0
          fi
          for i in 1 2 3 4 5; do
            if curl -fsS -o /dev/null "https://${{ vars.WEB_FQDN }}/api/products"; then
              echo "web smoke ok"
              exit 0
            fi
            echo "web smoke retry $i"
            sleep 10
          done
          echo "web smoke failed"; exit 1
